{% extends "base.html" %}
{% block content %}
<canvas id="genie-canvas"></canvas>
<div class="auth-wrapper">

    <div class="auth-box glass-panel" style="border-radius: var(--r-lg); padding: 3rem; text-align: center; border-color: rgba(59, 130, 246, 0.2);">
        <div class="auth-brand" style="margin-bottom: 2.5rem;">
            <h2 class="gradient-text" style="font-size: 2.2rem; margin-bottom: 0.5rem;">Create Account</h2>
            <p style="color: var(--text-muted); font-size: 0.95rem;">Join the elite FitGenie community</p>
        </div>

        <form method="POST">
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <div style="position: relative;">
                    <i class="fas fa-user-plus" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--secondary); font-size: 0.9rem;"></i>
                    <input type="text" name="username" placeholder="Choose Username" required minlength="3" autocomplete="username" 
                           style="padding-left: 3rem; width: 100%;">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 1.25rem;">
                <div style="position: relative;">
                    <i class="fas fa-envelope" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--secondary); font-size: 0.9rem;"></i>
                    <input type="email" name="email" placeholder="Email Address" required autocomplete="email" 
                           style="padding-left: 3rem; width: 100%;">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 2rem;">
                <div style="position: relative;">
                    <i class="fas fa-shield-halved" style="position: absolute; left: 1.25rem; top: 50%; transform: translateY(-50%); color: var(--secondary); font-size: 0.9rem;"></i>
                    <input type="password" name="password" placeholder="Password (min 6 chars)" required minlength="6" autocomplete="new-password" 
                           style="padding-left: 3rem; width: 100%;">
                </div>
            </div>
            <button class="primary-btn btn-block" type="submit" style="background: linear-gradient(135deg, var(--secondary), #2563eb); box-shadow: 0 10px 25px var(--secondary-glow);">
                <i class="fas fa-rocket"></i> Launch My Journey
            </button>
        </form>

        <p class="auth-link" style="margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">
            Already a member? <a href="{{ url_for('auth.login') }}" style="color: var(--secondary); text-decoration: none; font-weight: 700;">Sign In</a>
        </p>
    </div>
</div>


<style>
.auth-wrapper {
    position: relative;
    min-height: calc(100vh - 120px);
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
    overflow: hidden;
}
.auth-box {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 480px;
    animation: fadeUp 0.8s ease backwards;
}
@keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>
{% endblock %}
